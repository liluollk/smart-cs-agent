version: '3.8'

services:
  # Redis - 短期记忆存储
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL - 长期记忆向量存储 (pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${PGVECTOR_USER:-postgres}
      - POSTGRES_PASSWORD=${PGVECTOR_PASSWORD:-postgres}
      - POSTGRES_DB=${PGVECTOR_DB:-smartcs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres} -d ${PGVECTOR_DB:-smartcs}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Python实现
  python-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      - PGVECTOR_HOST=postgres
      - PGVECTOR_PORT=5432
      - PGVECTOR_DB=${PGVECTOR_DB:-smartcs}
      - PGVECTOR_USER=${PGVECTOR_USER:-postgres}
      - PGVECTOR_PASSWORD=${PGVECTOR_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379/0
      - OTEL_SERVICE_NAME=smart-cs-python
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Java实现
  java-agent:
    build:
      context: ./java-impl
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${PGVECTOR_DB:-smartcs}
      - SPRING_DATASOURCE_USERNAME=${PGVECTOR_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${PGVECTOR_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Jaeger - 全链路追踪可视化 (可选)
  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  redis_data:
  postgres_data: